<title>Nexora — Contas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --lime:#C8FF00; --lime-dark:#A8D400; --lime-dim:rgba(200,255,0,0.12);
      --lime-glow:rgba(200,255,0,0.22); --lime-border:rgba(200,255,0,0.28);
      --black:#060606; --dark:#0C0C0C; --surface:#101010; --surface2:#141414;
      --card:#161616; --card2:#1A1A1A; --border:rgba(255,255,255,0.07);
      --border2:rgba(255,255,255,0.04); --white:#FFFFFF; --gray:#666; --lgray:#999;
      --danger:#FF4D4D; --danger-dim:rgba(255,77,77,0.12); --danger-brd:rgba(255,77,77,0.28);
      --success:#00D37F; --success-dim:rgba(0,211,127,0.12); --success-brd:rgba(0,211,127,0.28);
      --warning:#FFB020; --warning-dim:rgba(255,176,32,0.12); --warning-brd:rgba(255,176,32,0.28);
      --info:#4DA6FF; --info-dim:rgba(77,166,255,0.12); --info-brd:rgba(77,166,255,0.28);
      --font-title:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
      --sidebar-w:260px; --topbar-h:68px; --radius:14px; --radius-sm:9px; --tr:0.28s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="light"] {
      --black:#F4F5F0; --dark:#EAEBE6; --surface:#FFFFFF; --surface2:#F4F5F0;
      --card:#FFFFFF; --card2:#ECEEE9; --border:rgba(0,0,0,0.08);
      --border2:rgba(0,0,0,0.04); --white:#111111; --gray:#888; --lgray:#555;
      --lime-dim:rgba(150,204,0,0.12); --lime-glow:rgba(150,204,0,0.18);
      --lime-border:rgba(130,185,0,0.35);
    }
    html { scroll-behavior: smooth; }
    body { background:var(--black); color:var(--white); font-family:var(--font-body); font-size:14px; line-height:1.55; overflow-x:hidden; min-height:100vh; }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--card2); border-radius:4px; }
    .app { display:flex; min-height:100vh; }
    /* SIDEBAR */
    .sidebar { width:var(--sidebar-w); min-height:100vh; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; z-index:100; overflow-y:auto; }
    .sidebar::before { content:''; position:absolute; top:0; left:0; right:0; height:180px; background:radial-gradient(ellipse at 50% -20%, rgba(200,255,0,0.08) 0%, transparent 70%); pointer-events:none; }
    .sb-logo { display:flex; align-items:center; gap:10px; padding:22px 20px 18px; border-bottom:1px solid var(--border); }
    .sb-logo-icon { width:34px; height:34px; border-radius:9px; background:var(--lime); color:#000; font-family:var(--font-title); font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sb-logo-text { font-family:var(--font-title); font-weight:700; font-size:16px; color:var(--white); }
    .sb-logo-badge { margin-left:auto; font-size:9px; font-weight:700; letter-spacing:.06em; background:var(--lime-dim); color:var(--lime); border:1px solid var(--lime-border); padding:2px 7px; border-radius:20px; }
    .sb-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:1px; overflow-y:auto; }
    .sb-section-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gray); padding:12px 8px 4px; }
    .sb-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm); color:var(--lgray); text-decoration:none; font-size:13px; font-weight:500; transition:all var(--tr); border:1px solid transparent; }
    .sb-item svg { width:16px; height:16px; flex-shrink:0; }
    .sb-item .badge { margin-left:auto; font-size:10px; font-weight:700; background:var(--lime-dim); color:var(--lime); border:1px solid var(--lime-border); padding:1px 6px; border-radius:20px; }
    .sb-item:hover { background:rgba(255,255,255,0.05); color:var(--white); }
    .sb-item.active { background:var(--lime-dim); color:var(--lime); border:1px solid var(--lime-border); }
    .sb-footer { padding:16px; border-top:1px solid var(--border); margin-top:auto; }
    .sb-user { display:flex; align-items:center; gap:10px; }
    .sb-avatar { width:34px; height:34px; border-radius:50%; background:var(--lime); color:#000; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; }
    .sb-user-name { font-size:13px; font-weight:600; color:var(--white); }
    .sb-user-plan { font-size:11px; color:var(--gray); }
    /* MAIN */
    .main-wrapper { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; gap:16px; flex-shrink:0; }
    .topbar-title { font-family:var(--font-title); font-size:20px; font-weight:700; color:var(--white); }
    .topbar-sub { font-size:13px; color:var(--lgray); margin-top:2px; }
    .topbar-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .page-content { padding:28px; flex:1; }
    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all var(--tr); font-family:var(--font-body); line-height:1; }
    .btn svg { width:15px; height:15px; }
    .btn-primary, .btn-lime { background:var(--lime); color:#000; }
    .btn-primary:hover, .btn-lime:hover { background:var(--lime-dark); }
    .btn-ghost { background:transparent; color:var(--lgray); border:1px solid var(--border); }
    .btn-ghost:hover { background:rgba(255,255,255,0.05); color:var(--white); border-color:rgba(255,255,255,0.15); }
    .btn-danger { background:var(--danger-dim); color:var(--danger); border:1px solid var(--danger-brd); }
    .btn-danger:hover { background:var(--danger); color:#fff; }
    .btn-success { background:var(--success-dim); color:var(--success); border:1px solid var(--success-brd); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:28px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .modal-title { font-family:var(--font-title); font-size:18px; font-weight:700; color:var(--white); }
    .modal-close { background:none; border:none; color:var(--lgray); font-size:22px; cursor:pointer; line-height:1; padding:4px; }
    .modal-close:hover { color:var(--white); }
    .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
    /* FORMS */
    .form-group { margin-bottom:14px; }
    .form-label { font-size:12px; color:var(--lgray); display:block; margin-bottom:6px; font-weight:500; }
    .form-input, .form-select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; color:var(--white); font-size:14px; font-family:var(--font-body); transition:border-color var(--tr); }
    .form-input:focus, .form-select:focus { outline:none; border-color:var(--lime-border); }
    .form-input::placeholder { color:var(--gray); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    /* CARDS */
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .card-title { font-family:var(--font-title); font-size:15px; font-weight:600; color:var(--white); }
    .card-action { font-size:13px; color:var(--lime); text-decoration:none; cursor:pointer; background:none; border:none; font-family:var(--font-body); font-weight:500; }
    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .stat-label { font-size:12px; color:var(--lgray); margin-bottom:8px; font-weight:500; }
    .stat-val, .stat-value { font-family:var(--font-title); font-size:24px; font-weight:700; color:var(--white); margin-bottom:4px; }
    .stat-sub { font-size:12px; color:var(--lgray); }
    .stat-pos { color:var(--success) !important; }
    .stat-neg { color:var(--danger) !important; }
    /* MISC */
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px; text-align:center; gap:12px; }
    .empty-icon { font-size:48px; opacity:.5; }
    .empty-title { font-family:var(--font-title); font-size:18px; font-weight:600; color:var(--white); }
    .empty-sub { font-size:14px; color:var(--lgray); max-width:300px; line-height:1.6; }
    .toast { position:fixed; bottom:24px; right:24px; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:14px 18px; font-size:13px; z-index:9999; opacity:0; transform:translateY(8px); transition:all .3s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.success { border-color:var(--success-brd); color:var(--success); }
    .toast.error { border-color:var(--danger-brd); color:var(--danger); }
    .badge { font-size:10px; font-weight:700; background:var(--lime-dim); color:var(--lime); border:1px solid var(--lime-border); padding:2px 8px; border-radius:20px; }
    .period-tabs { display:flex; gap:6px; }
    .period-tab { padding:5px 12px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--lgray); transition:all var(--tr); }
    .period-tab.active { background:var(--lime); color:#000; border-color:var(--lime); }
    .progress-bar { height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--lime),var(--lime-dark)); border-radius:99px; }
    @media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){.sidebar{display:none}.main-wrapper{margin-left:0}}
    /* ─ compat aliases ─ */
    :root {
      --mgray:#444; --txt:var(--white); --muted:var(--lgray);
      --red:var(--danger); --red-dim:var(--danger-dim); --red-brd:var(--danger-brd);
      --green:var(--success); --green-dim:var(--success-dim);
      --blue:var(--info); --blue-dim:var(--info-dim);
      --orange:var(--warning); --orange-dim:var(--warning-dim);
      --radius-xs:6px;
    }
    .stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}
.accounts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.account-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s}
.account-card:hover{border-color:rgba(200,255,0,.3)}
.account-color-bar{position:absolute;top:0;left:0;right:0;height:3px}
.account-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.account-icon-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.account-menu{display:flex;gap:8px}
.account-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
.account-bank{font-size:13px;color:var(--muted)}
.account-type{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#1e1e1e;color:var(--muted);margin-bottom:16px}
.account-balance{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}
.account-stats{display:flex;gap:20px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.account-stat-item{flex:1}
.account-stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.account-stat-value{font-size:14px;font-weight:600}
.add-card{background:transparent;border:2px dashed var(--border);border-radius:16px;padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;min-height:200px}
.add-card:hover{border-color:var(--lime);background:rgba(200,255,0,.03)}
.add-icon{width:48px;height:48px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:22px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:14px}
.empty-icon{font-size:56px;opacity:.4}.empty-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700}.empty-sub{font-size:14px;color:var(--muted);max-width:320px;line-height:1.6}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.form-input{width:100%;background:#1e1e1e;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:'Inter',sans-serif}
.form-input:focus{outline:none;border-color:var(--lime)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.color-options{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.color-opt.selected{border-color:var(--txt);transform:scale(1.15)}
.toast{position:fixed;bottom:24px;right:24px;background:#1e1e1e;border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{border-color:var(--success);color:var(--success)}.toast.error{border-color:var(--danger);color:var(--danger)}

  </style>
</head>

<div class="main-wrapper">
  <header class="topbar">
    <div><div class="topbar-title">Contas</div></div>
    <div class="topbar-actions"><button class="btn btn-lime" onclick="window.openModal()">+ Nova Conta</button></div>
  </header>
  <div class="page-content">
    <div class="stats-strip" id="statsStrip">
      <div class="stat-card"><div class="stat-label">💰 Saldo Total</div><div class="stat-value" id="statSaldo">R$ 0,00</div><div class="stat-sub">todas as contas</div></div>
      <div class="stat-card"><div class="stat-label">🏦 Contas Ativas</div><div class="stat-value" id="statQtd">0</div><div class="stat-sub">conectadas</div></div>
      <div class="stat-card"><div class="stat-label">📈 Maior Saldo</div><div class="stat-value" id="statMaior">R$ 0,00</div><div class="stat-sub" id="statMaiorNome">—</div></div>
    </div>
    <div class="accounts-grid" id="accountsGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="accModal">
<div class="modal-box">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700" id="modalTitle">Nova Conta</h2>
    <button onclick="window.closeModal()" style="background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1">×</button>
  </div>
  <input type="hidden" id="accId"/>
  <div class="form-group">
    <label class="form-label">Nome da conta *</label>
    <input id="accNome" class="form-input" placeholder="Ex: Conta Corrente, Poupança, Nubank…"/>
  </div>
  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">Banco *</label>
      <input id="accBanco" class="form-input" placeholder="Nubank, Itaú, BB…"/>
    </div>
    <div class="form-group">
      <label class="form-label">Tipo *</label>
      <select id="accTipo" class="form-input">
        <option value="corrente">Corrente</option>
        <option value="poupanca">Poupança</option>
        <option value="digital">Digital</option>
        <option value="investimento">Investimento</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Saldo inicial (R$)</label>
      <input id="accSaldo" type="number" step="0.01" class="form-input" placeholder="0,00"/>
    </div>
    <div class="form-group">
      <label class="form-label">Ícone</label>
      <input id="accIcone" class="form-input" placeholder="🏦" maxlength="2"/>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Cor da conta</label>
    <div class="color-options" id="colorOptions"></div>
  </div>
  <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
    <button class="btn btn-ghost" onclick="window.closeModal()">Cancelar</button>
    <button class="btn btn-danger" id="delBtn" style="display:none" onclick="window.deleteAcc()">Excluir</button>
    <button class="btn btn-lime" id="saveBtn" onclick="window.saveAcc()">Salvar</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { requireAuth, getProfile, getAccounts, getTransactions, createAccount, updateAccount, deleteAccount, fmt } from './js/db.js';

const CORES=['#C8FF00','#00C48C','#FFB800','#FF4D4D','#6C5CE7','#00B4D8','#F72585','#FF6B35','#4CC9F0','#E8E8E8'];
let accounts=[], transactions=[], editingId=null, selectedColor='#C8FF00';

(async()=>{
  const s=await requireAuth();if(!s)return;
  const p=await getProfile();
  if(p){
    document.getElementById('sbUserName').textContent=`${p.nome} ${p.sobrenome}`.trim()||'Usuário';
    document.getElementById('sbAvatar').textContent=(p.nome||'U').charAt(0).toUpperCase();
    /* plan hidden */
  }
  await load();
  buildColorPicker();
})();

async function load(){
  [accounts, transactions]=await Promise.all([getAccounts(), getTransactions()]);
  renderStats();
  renderGrid();
}

function renderStats(){
  const total=accounts.reduce((a,c)=>a+(+c.saldo),0);
  document.getElementById('statSaldo').textContent=fmt(total);
  document.getElementById('statQtd').textContent=accounts.length;
  if(accounts.length>0){
    const max=accounts.reduce((a,b)=>(+b.saldo)>(+a.saldo)?b:a);
    document.getElementById('statMaior').textContent=fmt(max.saldo);
    document.getElementById('statMaiorNome').textContent=max.nome;
  }
}

function renderGrid(){
  const el=document.getElementById('accountsGrid');
  if(accounts.length===0){
    el.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🏦</div><div class="empty-title">Nenhuma conta ainda</div><div class="empty-sub">Adicione suas contas bancárias para começar a controlar seu saldo e transações.</div><button class="btn btn-lime" onclick="window.openModal()" style="margin-top:8px">+ Adicionar primeira conta</button></div>`;
    return;
  }
  const txMap={};
  transactions.forEach(t=>{
    if(!t.account_id)return;
    if(!txMap[t.account_id])txMap[t.account_id]={in:0,out:0,count:0};
    if(t.tipo==='entrada')txMap[t.account_id].in+=(+t.valor);
    else txMap[t.account_id].out+=(+t.valor);
    txMap[t.account_id].count++;
  });
  el.innerHTML=accounts.map(a=>{
    const st=txMap[a.id]||{in:0,out:0,count:0};
    const color=a.cor||'#C8FF00';
    const saldoColor=(+a.saldo)>=0?'var(--success)':'var(--danger)';
    return `<div class="account-card" onclick="window.openModal('${a.id}')">
      <div class="account-color-bar" style="background:${color}"></div>
      <div class="account-top">
        <div class="account-icon-wrap" style="background:${color}22">${a.icone||'🏦'}</div>
        <div class="account-menu"><span style="font-size:11px;color:var(--muted);padding:4px 8px;background:#1e1e1e;border-radius:6px">${cap(a.tipo)}</span></div>
      </div>
      <div class="account-name">${a.nome}</div>
      <div class="account-bank">${a.banco}</div>
      <div class="account-balance" style="color:${saldoColor};margin-top:12px">${fmt(a.saldo)}</div>
      <div class="account-stats">
        <div class="account-stat-item"><div class="account-stat-label">📥 Entradas</div><div class="account-stat-value" style="color:var(--success)">${fmt(st.in)}</div></div>
        <div class="account-stat-item"><div class="account-stat-label">📤 Saídas</div><div class="account-stat-value" style="color:var(--danger)">${fmt(st.out)}</div></div>
        <div class="account-stat-item"><div class="account-stat-label">↕️ Transações</div><div class="account-stat-value">${st.count}</div></div>
      </div>
    </div>`;
  }).join('')+`<div class="add-card" onclick="window.openModal()"><div class="add-icon">+</div><span style="font-size:14px;font-weight:600;color:var(--muted)">Nova Conta</span></div>`;
}

function buildColorPicker(){
  const el=document.getElementById('colorOptions');
  el.innerHTML=CORES.map(c=>`<div class="color-opt ${c===selectedColor?'selected':''}" style="background:${c}" onclick="window.selectColor('${c}',this)" title="${c}"></div>`).join('');
}

window.selectColor=(c,el)=>{
  selectedColor=c;
  document.querySelectorAll('.color-opt').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
};

window.openModal=(id=null)=>{
  editingId=id;
  document.getElementById('modalTitle').textContent=id?'Editar Conta':'Nova Conta';
  document.getElementById('saveBtn').textContent=id?'Salvar Alterações':'Salvar';
  document.getElementById('delBtn').style.display=id?'block':'none';
  if(id){
    const a=accounts.find(x=>x.id===id);
    document.getElementById('accId').value=a.id;
    document.getElementById('accNome').value=a.nome;
    document.getElementById('accBanco').value=a.banco;
    document.getElementById('accTipo').value=a.tipo;
    document.getElementById('accSaldo').value=a.saldo;
    document.getElementById('accIcone').value=a.icone||'🏦';
    selectedColor=a.cor||'#C8FF00';
  }else{
    document.getElementById('accId').value='';
    document.getElementById('accNome').value='';
    document.getElementById('accBanco').value='';
    document.getElementById('accTipo').value='corrente';
    document.getElementById('accSaldo').value='0';
    document.getElementById('accIcone').value='🏦';
    selectedColor='#C8FF00';
  }
  buildColorPicker();
  document.getElementById('accModal').style.display='flex';
};

window.closeModal=()=>{document.getElementById('accModal').style.display='none';};

window.saveAcc=async()=>{
  const nome=document.getElementById('accNome').value.trim();
  const banco=document.getElementById('accBanco').value.trim();
  const tipo=document.getElementById('accTipo').value;
  const saldo=parseFloat(document.getElementById('accSaldo').value)||0;
  const icone=document.getElementById('accIcone').value.trim()||'🏦';
  if(!nome){toast('Informe o nome da conta','error');return;}
  if(!banco){toast('Informe o banco','error');return;}
  const btn=document.getElementById('saveBtn');btn.textContent='Salvando…';btn.disabled=true;
  const payload={nome,banco,tipo,saldo,icone,cor:selectedColor};
  const res=editingId?await updateAccount(editingId,payload):await createAccount(payload);
  btn.textContent='Salvar';btn.disabled=false;
  if(res.error){toast('Erro: '+res.error.message,'error');return;}
  toast(editingId?'Conta atualizada!':'Conta criada!','success');
  window.closeModal();
  await load();
};

window.deleteAcc=async()=>{
  if(!confirm('Excluir esta conta? As transações vinculadas não serão apagadas.'))return;
  const res=await deleteAccount(editingId);
  if(res.error){toast('Erro: '+res.error.message,'error');return;}
  toast('Conta removida','success');
  window.closeModal();
  await load();
};

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  setTimeout(()=>{el.className='toast';},3200);
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
</script>
</body>
</html>
