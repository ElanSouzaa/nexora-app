<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nexora — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--lime:#C8FF00;--black:#060606;--surface:#101010;--card:#161616;--border:#222;--txt:#E8E8E8;--muted:#888;--sidebar-w:260px;--danger:#FF4D4D;--success:#00C48C;--warn:#FFB800}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--txt);display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.logo{padding:24px 20px;font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--lime);border-bottom:1px solid var(--border)}
.logo span{color:var(--txt)}
.nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:4px;transition:all .2s}
.nav a:hover{background:#1a1a1a;color:var(--txt)}
.nav a.active{background:rgba(200,255,0,.1);color:var(--lime)}
.nav-section{font-size:11px;color:var(--muted);padding:12px 12px 4px;letter-spacing:.08em;text-transform:uppercase}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:#1a1a1a}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--black);flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-plan{font-size:11px;color:var(--muted)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Inter',sans-serif}
.btn-lime{background:var(--lime);color:var(--black)}.btn-lime:hover{background:#b8ec00}
.btn-ghost{background:transparent;color:var(--txt);border:1px solid var(--border)}.btn-ghost:hover{background:#1a1a1a}
.content{padding:28px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500}
.stat-value{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px}
.stat-sub{font-size:12px;color:var(--muted)}
.stat-pos{color:var(--success)}.stat-neg{color:var(--danger)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600}
.card-action{font-size:13px;color:var(--lime);text-decoration:none;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500}
.tx-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:38px;height:38px;border-radius:10px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--muted)}
.tx-val{font-size:14px;font-weight:700;text-align:right;flex-shrink:0}
.goal-item{display:flex;flex-direction:column;gap:8px;padding:12px 0;border-bottom:1px solid var(--border)}
.goal-item:last-child{border-bottom:none}
.goal-top{display:flex;justify-content:space-between;align-items:center}
.goal-name{font-size:14px;font-weight:500}
.goal-pct{font-size:13px;color:var(--lime);font-weight:600}
.progress-bar{height:6px;background:#222;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--lime),#a0d000);border-radius:99px}
.goal-vals{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;gap:12px}
.empty-icon{font-size:48px;opacity:.5}
.empty-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600}
.empty-sub{font-size:14px;color:var(--muted);max-width:300px;line-height:1.6}
.period-tabs{display:flex;gap:6px}
.period-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s}
.period-tab.active{background:var(--lime);color:var(--black);border-color:var(--lime)}
.welcome-banner{background:linear-gradient(135deg,rgba(200,255,0,.08),rgba(200,255,0,.03));border:1px solid rgba(200,255,0,.2);border-radius:14px;padding:24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.welcome-text h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.welcome-text p{font-size:14px;color:var(--muted);max-width:420px;line-height:1.6}
.welcome-actions{display:flex;gap:10px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e1e1e;border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{border-color:var(--success);color:var(--success)}.toast.error{border-color:var(--danger);color:var(--danger)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.form-input{width:100%;background:#1e1e1e;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:'Inter',sans-serif}
.form-input:focus{outline:none;border-color:var(--lime)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">Nexo<span>ra</span></div>
  <nav class="nav">
    <div class="nav-section">Principal</div>
    <a href="dashboard.html" class="active">🏠 Dashboard</a>
    <a href="transacoes.html">↕️ Transações</a>
    <a href="contas.html">🏦 Contas</a>
    <a href="cartoes.html">💳 Cartões</a>
    <div class="nav-section">Gestão</div>
    <a href="metas.html">🎯 Metas</a>
    <a href="relatorios.html">📊 Relatórios</a>
    <a href="investimentos.html">📈 Investimentos</a>
    <div class="nav-section">Suporte</div>
    <a href="chat-ia.html">🤖 Chat IA</a>
    <a href="alertas.html">🔔 Alertas</a>
    <a href="configuracoes.html">⚙️ Configurações</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-pill">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebarName">Carregando…</div>
        <div class="user-plan" id="sidebarPlan">Plano Free</div>
      </div>
    </div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <h1>Dashboard</h1>
    <div class="topbar-right">
      <div class="period-tabs">
        <button class="period-tab active" onclick="window.setPeriod('month',this)">Este mês</button>
        <button class="period-tab" onclick="window.setPeriod('3m',this)">3 meses</button>
        <button class="period-tab" onclick="window.setPeriod('year',this)">Este ano</button>
      </div>
      <button class="btn btn-lime" onclick="window.openTxModal()">+ Nova Transação</button>
    </div>
  </header>
  <div class="content" id="mainContent"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-sub">Carregando…</div></div></div>
</div>

<!-- TX MODAL -->
<div class="modal-overlay" id="txModal">
<div class="modal-box">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700" id="txModalTitle">Nova Transação</h2>
    <button onclick="window.closeTxModal()" style="background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1">×</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:20px">
    <button id="tabEntrada" class="btn" style="flex:1;background:rgba(0,196,140,.15);color:var(--success);border:1px solid var(--success)" onclick="window.setTxTipo('entrada')">⬇ Entrada</button>
    <button id="tabSaida"   class="btn btn-ghost" style="flex:1" onclick="window.setTxTipo('saida')">⬆ Saída</button>
  </div>
  <input type="hidden" id="txId"/>
  <input type="hidden" id="txTipo" value="entrada"/>
  <div class="form-grid">
    <div style="grid-column:1/-1" class="form-group">
      <label class="form-label">Descrição / Para quem *</label>
      <input id="txDesc" class="form-input" placeholder="Ex: iFood, João Silva, Salário…"/>
    </div>
    <div class="form-group">
      <label class="form-label">Valor (R$) *</label>
      <input id="txValor" type="number" step="0.01" class="form-input" placeholder="0,00"/>
    </div>
    <div class="form-group">
      <label class="form-label">Data *</label>
      <input id="txData" type="date" class="form-input"/>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria *</label>
      <select id="txCategoria" class="form-input"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Conta *</label>
      <select id="txConta" class="form-input"></select>
    </div>
    <div class="form-group" style="grid-column:1/-1">
      <label class="form-label">Forma de Pagamento *</label>
      <select id="txMetodo" class="form-input"></select>
    </div>
    <div class="form-group" style="grid-column:1/-1">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="txRecorrente" style="width:16px;height:16px;accent-color:var(--lime)"/> Transação recorrente / fixa mensal
      </label>
    </div>
    <div class="form-group" style="grid-column:1/-1">
      <label class="form-label">Observações</label>
      <textarea id="txNotas" rows="2" class="form-input" placeholder="Informações extras…" style="resize:none"></textarea>
    </div>
  </div>
  <div style="display:flex;gap:10px;margin-top:8px;justify-content:flex-end">
    <button class="btn btn-ghost" onclick="window.closeTxModal()">Cancelar</button>
    <button class="btn btn-lime" id="txSaveBtn" onclick="window.saveTx()">Salvar</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { sb, requireAuth, getProfile, getAccounts, getTransactions, getGoals, getInvestments,
         createTransaction, updateTransaction, fmt, fmtDate, categorias, metodos } from './js/db.js';

let profile=null, accounts=[], transactions=[], goals=[], investments=[];
let period='month', editingTxId=null;

(async()=>{
  const session = await requireAuth();
  if(!session) return;
  [profile,accounts,transactions,goals,investments] = await Promise.all([
    getProfile(),getAccounts(),getTransactions(),getGoals(),getInvestments()
  ]);
  renderSidebar();
  populateTxModal();
  renderContent();
})();

function renderSidebar(){
  if(!profile) return;
  const n=`${profile.nome} ${profile.sobrenome}`.trim()||'Usuário';
  document.getElementById('sidebarName').textContent=n;
  document.getElementById('sidebarPlan').textContent=profile.plano==='pro'?'⭐ Pro':'Plano Free';
  document.getElementById('sidebarAvatar').textContent=n.charAt(0).toUpperCase();
}

window.setPeriod=(p,el)=>{
  period=p;
  document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderContent();
};

function periodRange(){
  const now=new Date();
  if(period==='month') return {from:new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0],to:new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]};
  if(period==='3m') return {from:new Date(now.getFullYear(),now.getMonth()-2,1).toISOString().split('T')[0],to:new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]};
  return {from:`${now.getFullYear()}-01-01`,to:`${now.getFullYear()}-12-31`};
}

function renderContent(){
  const {from,to}=periodRange();
  const fil=transactions.filter(t=>t.data_compra>=from&&t.data_compra<=to);
  const entradas=fil.filter(t=>t.tipo==='entrada').reduce((a,t)=>a+(+t.valor),0);
  const saidas=fil.filter(t=>t.tipo==='saida').reduce((a,t)=>a+(+t.valor),0);
  const saldoTotal=accounts.reduce((a,c)=>a+(+c.saldo),0);
  const patrimInv=investments.reduce((a,i)=>a+(+i.valor_atual),0);
  const recentes=[...transactions].sort((a,b)=>b.data_compra.localeCompare(a.data_compra)).slice(0,8);
  const isEmpty=transactions.length===0&&accounts.length===0;
  const el=document.getElementById('mainContent');

  const stats=`<div class="stats-grid">
    ${sCard('💰','Saldo Total',fmt(saldoTotal),accounts.length+' conta(s)','')}
    ${sCard('📥','Entradas',fmt(entradas),fil.filter(t=>t.tipo==='entrada').length+' transações','pos')}
    ${sCard('📤','Saídas',fmt(saidas),fil.filter(t=>t.tipo==='saida').length+' transações','neg')}
    ${sCard('📈','Investimentos',fmt(patrimInv),investments.length+' ativo(s)','')}
  </div>`;

  if(isEmpty){
    el.innerHTML=welcomeBanner()+stats+`
    <div class="grid-3">
      <div class="card"><div class="card-header"><span class="card-title">Últimas Transações</span></div>
        <div class="empty"><div class="empty-icon">↕️</div><div class="empty-title">Sem transações ainda</div><div class="empty-sub">Clique em "+ Nova Transação" para começar, ou importe um extrato bancário.</div></div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Metas</span></div>
        <div class="empty"><div class="empty-icon">🎯</div><div class="empty-sub">Nenhuma meta criada</div><a href="metas.html" class="btn btn-ghost" style="margin-top:8px;font-size:12px">Criar meta</a></div>
      </div>
    </div>`;
    return;
  }

  el.innerHTML=stats+`
  <div class="grid-3">
    <div class="card"><div class="card-header"><span class="card-title">Últimas Transações</span><a href="transacoes.html" class="card-action">Ver todas →</a></div>
      ${recentes.length===0?`<div class="empty"><div class="empty-icon">↕️</div><div class="empty-sub">Sem transações no período</div></div>`:recentes.map(txRow).join('')}
    </div>
    <div class="card"><div class="card-header"><span class="card-title">🎯 Metas</span><a href="metas.html" class="card-action">Ver todas →</a></div>
      ${goals.length===0?`<div class="empty"><div class="empty-icon">🎯</div><div class="empty-sub">Nenhuma meta criada</div><a href="metas.html" class="btn btn-ghost" style="margin-top:8px;font-size:12px">Criar meta</a></div>`:goals.slice(0,4).map(goalRow).join('')}
    </div>
  </div>
  <div class="grid-2">${accountsCard()}${catCard(fil)}</div>`;
}

function sCard(icon,label,value,sub,t){
  return `<div class="stat-card"><div class="stat-label">${icon} ${label}</div><div class="stat-value ${t==='pos'?'stat-pos':t==='neg'?'stat-neg':''}">${value}</div><div class="stat-sub">${sub}</div></div>`;
}

function txRow(t){
  const v=t.tipo==='entrada'?`<span class="stat-pos">+${fmt(t.valor)}</span>`:`<span class="stat-neg">−${fmt(t.valor)}</span>`;
  return `<div class="tx-item"><div class="tx-icon">${catIcon(t.categoria)}</div><div class="tx-info"><div class="tx-desc">${t.descricao}</div><div class="tx-meta">${fmtDate(t.data_compra)} · ${cap(t.metodo)}</div></div><div class="tx-val">${v}</div></div>`;
}

function goalRow(g){
  const pct=Math.min(100,Math.round((+g.valor_atual/+g.valor_objetivo)*100));
  return `<div class="goal-item"><div class="goal-top"><span class="goal-name">${g.emoji||'🎯'} ${g.nome}</span><span class="goal-pct">${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="goal-vals"><span>${fmt(g.valor_atual)}</span><span>${fmt(g.valor_objetivo)}</span></div></div>`;
}

function accountsCard(){
  if(accounts.length===0) return `<div class="card"><div class="card-header"><span class="card-title">🏦 Contas</span><a href="contas.html" class="card-action">Gerenciar →</a></div><div class="empty"><div class="empty-icon">🏦</div><div class="empty-sub">Adicione sua primeira conta</div><a href="contas.html" class="btn btn-lime" style="margin-top:8px;font-size:12px">+ Adicionar</a></div></div>`;
  return `<div class="card"><div class="card-header"><span class="card-title">🏦 Contas</span><a href="contas.html" class="card-action">Gerenciar →</a></div>${accounts.map(a=>`<div class="tx-item"><div class="tx-icon" style="background:${a.cor||'#1e1e1e'}">${a.icone||'🏦'}</div><div class="tx-info"><div class="tx-desc">${a.nome}</div><div class="tx-meta">${cap(a.tipo)} · ${a.banco}</div></div><div class="tx-val" style="color:${+a.saldo>=0?'var(--success)':'var(--danger)'}">${fmt(a.saldo)}</div></div>`).join('')}</div>`;
}

function catCard(fil){
  const cats={};
  fil.filter(t=>t.tipo==='saida').forEach(t=>{cats[t.categoria]=(cats[t.categoria]||0)+(+t.valor);});
  const total=Object.values(cats).reduce((a,v)=>a+v,0);
  const top=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(top.length===0) return `<div class="card"><div class="card-header"><span class="card-title">📊 Gastos por Categoria</span></div><div class="empty"><div class="empty-icon">📊</div><div class="empty-sub">Nenhuma saída no período</div></div></div>`;
  return `<div class="card"><div class="card-header"><span class="card-title">📊 Gastos por Categoria</span></div>${top.map(([c,v])=>{const pct=Math.round((v/total)*100);return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${catIcon(c)} ${catLbl(c)}</span><span style="color:var(--muted)">${fmt(v)} · ${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;}).join('')}</div>`;
}

function welcomeBanner(){
  const name=profile?.nome||'usuário';
  return `<div class="welcome-banner"><div class="welcome-text"><h2>Bem-vindo ao Nexora, ${name}! 👋</h2><p>Seu dashboard está pronto. Comece adicionando suas contas bancárias e primeiras transações.</p></div><div class="welcome-actions"><a href="contas.html" class="btn btn-lime">+ Adicionar Conta</a><button class="btn btn-ghost" onclick="window.openTxModal()">+ Nova Transação</button></div></div>`;
}

/* TX MODAL */
function populateTxModal(){
  const cs=document.getElementById('txCategoria');
  categorias().forEach(c=>{cs.appendChild(new Option(c.l,c.v));});
  const ms=document.getElementById('txMetodo');
  metodos().forEach(m=>{ms.appendChild(new Option(m.l,m.v));});
  document.getElementById('txData').value=new Date().toISOString().split('T')[0];
  refreshTxAccounts();
}

function refreshTxAccounts(){
  const sel=document.getElementById('txConta');
  sel.innerHTML='<option value="">— Selecione a conta —</option>';
  if(accounts.length===0){sel.innerHTML='<option value="">Nenhuma conta (adicione em Contas)</option>';return;}
  accounts.forEach(a=>{sel.appendChild(new Option(`${a.icone||'🏦'} ${a.nome} (${a.banco})`,a.id));});
}

window.openTxModal=(tx=null)=>{
  editingTxId=tx?tx.id:null;
  document.getElementById('txModalTitle').textContent=tx?'Editar Transação':'Nova Transação';
  document.getElementById('txSaveBtn').textContent=tx?'Salvar Alterações':'Salvar';
  if(tx){
    document.getElementById('txId').value=tx.id;
    document.getElementById('txDesc').value=tx.descricao;
    document.getElementById('txValor').value=tx.valor;
    document.getElementById('txData').value=tx.data_compra;
    document.getElementById('txCategoria').value=tx.categoria;
    document.getElementById('txConta').value=tx.account_id||'';
    document.getElementById('txMetodo').value=tx.metodo;
    document.getElementById('txRecorrente').checked=tx.recorrente;
    document.getElementById('txNotas').value=tx.notas||'';
    setTipoUI(tx.tipo);document.getElementById('txTipo').value=tx.tipo;
  }else{
    document.getElementById('txId').value='';document.getElementById('txDesc').value='';
    document.getElementById('txValor').value='';
    document.getElementById('txData').value=new Date().toISOString().split('T')[0];
    document.getElementById('txCategoria').value='outros';document.getElementById('txConta').value='';
    document.getElementById('txMetodo').value='pix';document.getElementById('txRecorrente').checked=false;
    document.getElementById('txNotas').value='';setTipoUI('entrada');document.getElementById('txTipo').value='entrada';
  }
  document.getElementById('txModal').style.display='flex';
};

window.closeTxModal=()=>{document.getElementById('txModal').style.display='none';};

window.setTxTipo=(tipo)=>{document.getElementById('txTipo').value=tipo;setTipoUI(tipo);};

function setTipoUI(tipo){
  const te=document.getElementById('tabEntrada'),ts=document.getElementById('tabSaida');
  if(tipo==='entrada'){te.style.cssText='flex:1;background:rgba(0,196,140,.15);color:var(--success);border:1px solid var(--success)';ts.className='btn btn-ghost';ts.style.cssText='flex:1';}
  else{ts.style.cssText='flex:1;background:rgba(255,77,77,.12);color:var(--danger);border:1px solid var(--danger)';te.className='btn btn-ghost';te.style.cssText='flex:1';}
}

window.saveTx=async()=>{
  const desc=document.getElementById('txDesc').value.trim();
  const valor=parseFloat(document.getElementById('txValor').value);
  const data=document.getElementById('txData').value;
  const cat=document.getElementById('txCategoria').value;
  const conta=document.getElementById('txConta').value;
  const met=document.getElementById('txMetodo').value;
  const tipo=document.getElementById('txTipo').value;
  const rec=document.getElementById('txRecorrente').checked;
  const notas=document.getElementById('txNotas').value.trim();
  if(!desc){toast('Informe a descrição','error');return;}
  if(!valor||valor<=0){toast('Informe um valor válido','error');return;}
  if(!data){toast('Informe a data','error');return;}
  const btn=document.getElementById('txSaveBtn');btn.textContent='Salvando…';btn.disabled=true;
  const payload={descricao:desc,valor,data_compra:data,categoria:cat,account_id:conta||null,metodo:met,tipo,recorrente:rec,notas};
  const res=editingTxId ? await import('./js/db.js').then(m=>m.updateTransaction(editingTxId,payload)) : await createTransaction(payload);
  btn.textContent='Salvar';btn.disabled=false;
  if(res.error){toast('Erro: '+res.error.message,'error');return;}
  toast(editingTxId?'Transação atualizada!':'Transação registrada!','success');
  window.closeTxModal();
  [transactions,accounts]=await Promise.all([getTransactions(),getAccounts()]);
  renderContent();
};

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  setTimeout(()=>{el.className='toast';},3200);
}

function catIcon(c){const m={alimentacao:'🍽️',transporte:'🚗',saude:'🏥',educacao:'📚',lazer:'🎮',moradia:'🏠',vestuario:'👕',servicos:'📱',salario:'💼',freelance:'💻',investimentos:'📈',transferencia:'↔️',outros:'📦'};return m[c]||'📦';}
function catLbl(c){const f=categorias().find(x=>x.v===c);return f?f.l.replace(/^\S+\s/,''):cap(c);}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
</script>
